<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Rustamov | AI Brand Detector v11</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --secondary: #7000ff; --bg: #020617; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; min-height: 100vh; background-image: radial-gradient(circle at 10% 10%, rgba(112, 0, 255, 0.1) 0%, transparent 40%), radial-gradient(circle at 90% 90%, rgba(0, 242, 255, 0.1) 0%, transparent 40%); }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        header { text-align: center; margin-bottom: 40px; }
        .logo-text { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; letter-spacing: 4px; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub-header { color: #94a3b8; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }
        .main-nav { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .nav-card { background: var(--glass); border: 1px solid var(--glass-border); backdrop-filter: blur(15px); padding: 25px; border-radius: 20px; text-align: center; cursor: pointer; }
        .nav-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .nav-card.active { border-color: var(--primary); background: rgba(0, 242, 255, 0.1); }
        .page-section { display: none; }
        .page-section.active { display: block; }
        .detector-ui { background: var(--glass); border-radius: 25px; border: 1px solid var(--glass-border); padding: 30px; text-align: center; }
        .scan-window { width: 100%; max-width: 450px; height: 280px; margin: 0 auto 25px; border: 2px dashed var(--glass-border); border-radius: 15px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background: rgba(0,0,0,0.2); }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--primary); box-shadow: 0 0 15px var(--primary); display: none; animation: scanLoop 2s infinite linear; }
        @keyframes scanLoop { 0% { top: 0; } 100% { top: 100%; } }
        .btn-action { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; border: none; padding: 14px 35px; border-radius: 50px; font-family: 'Orbitron', sans-serif; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-text">DANIEL RUSTAMOV</div>
            <div class="sub-header">Н.Ш.Л.И.Т. №5 | 6-В КЛАСС</div>
        </header>
        <div class="main-nav">
            <div id="btn-detector" class="nav-card active" onclick="switchTab('detector')"><h2>AI ДЕТЕКТОР</h2></div>
            <div id="btn-portfolio" class="nav-card" onclick="switchTab('portfolio')"><h2>ПОРТФОЛИО</h2></div>
        </div>
        <section id="detector" class="page-section active">
            <div class="detector-ui">
                <div class="scan-window" onclick="document.getElementById('fileInput').click()">
                    <div class="scan-line" id="scanLine"></div>
                    <div id="dropText"><p>Загрузи логотип</p></div>
                    <img id="preview" style="display:none; width: 100%; height: 100%; object-fit: contain;">
                </div>
                <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFile(this.files[0])">
                <button class="btn-action" onclick="runAnalysis()">АНАЛИЗ БРЕНДА</button>
                <div id="status" style="margin-top: 15px; color: white;"></div>
            </div>
        </section>
        <section id="portfolio" class="page-section">
            <p style="text-align:center;">Тут твое портфолио</p>
        </section>
    </div>

    <script>
        function switchTab(tabName) {
            document.getElementById('detector').classList.remove('active');
            document.getElementById('portfolio').classList.remove('active');
            document.getElementById('btn-detector').classList.remove('active');
            document.getElementById('btn-portfolio').classList.remove('active');
            document.getElementById(tabName).classList.add('active');
            document.getElementById('btn-' + tabName).classList.add('active');
        }

        function handleFile(file) {
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('dropText').style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        }

        function runAnalysis() {
            if (!document.getElementById('fileInput').files[0]) return alert("Выбери файл!");
            const line = document.getElementById('scanLine');
            const status = document.getElementById('status');
            line.style.display = 'block';
            status.innerHTML = "ПОДКЛЮЧЕНИЕ К СЕРВЕРУ...";
            setTimeout(() => {
                window.location.href = "https://alacademyprjcts2-6ld6rn87kgzaxu8psfwesa.streamlit.app/";
            }, 2000);
        }
    </script>
</body>
</html>
