<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Rustamov | AI Brand Detector v11</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Переменные для быстрого изменения цветовой палитры всего сайта */
        :root { 
            --primary: #00f2ff; 
            --secondary: #7000ff; 
            --bg: #020617; 
            --glass: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(255, 255, 255, 0.1); 
        }

        /* Базовые сбросы стилей для всех элементов */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            transition: all 0.3s ease; /* Плавная анимация для всех изменений */
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: white; 
            min-height: 100vh; 
            /* Сложный радиальный градиент для космического/технологичного фона */
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(112, 0, 255, 0.1) 0%, transparent 40%), 
                radial-gradient(circle at 90% 90%, rgba(0, 242, 255, 0.1) 0%, transparent 40%); 
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        header { text-align: center; margin-bottom: 40px; }
        
        .logo-text { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 2.2rem; 
            letter-spacing: 4px; 
            /* Эффект градиентного текста */
            background: linear-gradient(to right, #fff, var(--primary)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .sub-header { color: #94a3b8; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }
        .main-nav { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        
        /* Стили для кнопок навигации (эффект стекла) */
        .nav-card { 
            background: var(--glass); 
            border: 1px solid var(--glass-border); 
            backdrop-filter: blur(15px); /* Размытие фона под карточкой */
            padding: 25px; 
            border-radius: 20px; 
            text-align: center; 
            cursor: pointer; 
        }
        
        .nav-card:hover { 
            border-color: var(--primary); 
            transform: translateY(-5px); /* Приподнимание при наведении */
            box-shadow: 0 10px 25px rgba(0, 242, 255, 0.15); 
        }
        
        .nav-card.active { border-color: var(--primary); background: rgba(0, 242, 255, 0.1); }
        .nav-card h2 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; }
        
        /* Скрываем секции по умолчанию */
        .page-section { display: none; }
        
        /* Показываем активную секцию с плавной анимацией появления */
        .page-section.active { 
            display: block; 
            animation: slideIn 0.5s ease forwards; 
        }
        
        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Новые классы, заменяющие inline-стили из HTML */
        .detector-container {
            padding: 0; 
            overflow: hidden; 
            border-radius: 25px; 
            border: 1px solid var(--glass-border); 
            background: transparent;
        }

        .portfolio-title {
            text-align: center; 
            margin-bottom: 30px; 
            color: var(--primary); 
            font-family: 'Orbitron', sans-serif;
        }

        .video-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
            padding: 10px;
        }

        .footer-info { margin-top: 40px; padding: 25px; background: var(--glass); border-radius: 20px; text-align: center; border: 1px solid var(--glass-border); }
        .contact-links { margin-top: 10px; }
        .contact-links a { color: var(--primary); text-decoration: none; margin: 0 10px; font-size: 0.9rem; }
        
        /* Адаптация под мобильные устройства */
        @media (max-width: 600px) { 
            .main-nav { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-text">DANIEL RUSTAMOV</div>
            <div class="sub-header">Н.Ш.Л.И.Т. №5 | 6-В КЛАСС</div>
        </header>

        <div class="main-nav">
            <div id="btn-detector" class="nav-card active" onclick="switchTab('detector')">
                <h2>AI ДЕТЕКТОР</h2>
            </div>
            <div id="btn-portfolio" class="nav-card" onclick="switchTab('portfolio')">
                <h2>ПОРТФОЛИО</h2>
            </div>
        </div>

        <section id="detector" class="page-section active">
            <div class="detector-container">
                <iframe 
                    src="https://alacademyprjcts2-6ld6rn87kgzaxu8psfwesa.streamlit.app/?embed=true" 
                    width="100%" 
                    height="650px" 
                    frameborder="0"
                    title="AI Brand Detector Application"
                    style="display: block;">

        <section id="portfolio" class="page-section">

            <div class="video-grid">
                <iframe width="100%" height="200" src="https://www.youtube.com/embed/VhYT_IdYoK4" frameborder="0" allowfullscreen loading="lazy" title="Project Video 1"></iframe>
                <iframe width="100%" height="200" src="https://www.youtube.com/embed/ROeQnYrE1tk" frameborder="0" allowfullscreen loading="lazy" title="Project Video 2"></iframe>
                <iframe width="100%" height="200" src="https://www.youtube.com/embed/T0gvqGBZt_0" frameborder="0" allowfullscreen loading="lazy" title="Project Video 3"></iframe>
                <iframe width="100%" height="200" src="https://www.youtube.com/embed/IG4wFxm96jo" frameborder="0" allowfullscreen loading="lazy" title="Project Video 4"></iframe>
                <iframe width="100%" height="200" src="https://www.youtube.com/embed/03KSzlgUWj4" frameborder="0" allowfullscreen loading="lazy" title="Project Video 5"></iframe>
                <iframe width="100%" height="200" src="https://www.youtube.com/embed/4AkSdHu0F9E" frameborder="0" allowfullscreen loading="lazy" title="Project Video 6"></iframe>
                <iframe width="100%" height="200" src="https://www.youtube.com/embed/8yueaMHLnMY" frameborder="0" allowfullscreen loading="lazy" title="Project Video 7"></iframe>
                <iframe width="100%" height="200" src="https://www.youtube.com/embed/FvRSn9WPEFE" frameborder="0" allowfullscreen loading="lazy" title="Project Video 8"></iframe>
                <iframe width="100%" height="200" src="https://www.youtube.com/embed/FQZnBDwYdMk" frameborder="0" allowfullscreen loading="lazy" title="Project Video 9"></iframe>
                <iframe width="100%" height="200" src="https://www.youtube.com/embed/vlzzWGibCw0" frameborder="0" allowfullscreen loading="lazy" title="Project Video 10"></iframe>
            </div>
        </section>

        <div class="footer-info">
            <p>+996 501 37 98 01</p>
            <div class="contact-links">
                <a href="https://www.tiktok.com/@d244512" target="_blank">TIKTOK</a>
                <a href="https://instagram.com/dani4.252" target="_blank">INSTAGRAM</a>
                <a href="mailto:d68856815@gmail.com">GMAIL</a>
            </div>
        </div>
    </div>

    <script>
        /**
         * Функция для переключения между вкладками "AI Детектор" и "Портфолио".
         * @param {string} tabName - Имя вкладки ('detector' или 'portfolio'), которую нужно открыть.
         */
        function switchTab(tabName) {
            // ШАГ 1: Скрываем все секции и убираем активное состояние со всех кнопок
            // Метод classList.remove удаляет класс 'active', из-за чего элемент исчезает (согласно CSS)
            document.getElementById('detector').classList.remove('active');
            document.getElementById('portfolio').classList.remove('active');
            document.getElementById('btn-detector').classList.remove('active');
            document.getElementById('btn-portfolio').classList.remove('active');

            // ШАГ 2: Показываем запрошенную секцию и подсвечиваем нужную кнопку
            // Метод classList.add добавляет класс 'active', запуская анимацию slideIn
            document.getElementById(tabName).classList.add('active');
            document.getElementById('btn-' + tabName).classList.add('active');
        }
    </script>
</body>
</html>
