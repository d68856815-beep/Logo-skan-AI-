\<script>
    function switchTab(tabName) {
        document.getElementById('detector').classList.remove('active');
        document.getElementById('portfolio').classList.remove('active');
        document.getElementById('btn-detector').classList.remove('active');
        document.getElementById('btn-portfolio').classList.remove('active');

        document.getElementById(tabName).classList.add('active');
        document.getElementById('btn-' + tabName).classList.add('active');
    }

    function handleFile(file) {
        if (file) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('preview').src = e.target.result;
                document.getElementById('preview').style.display = 'block';
                document.getElementById('dropText').style.display = 'none';
                document.getElementById('status').innerHTML = "";
            }
            reader.readAsDataURL(file);
        }
    }

    function runAnalysis() {
        // Проверка: выбран ли файл
        if (!document.getElementById('fileInput').files[0]) {
            return alert("Сначала выбери файл для проверки!");
        }

        const line = document.getElementById('scanLine');
        const status = document.getElementById('status');
        
        // 1. Запуск анимации
        line.style.display = 'block';
        status.style.color = "#00f2ff";
        status.innerHTML = "ПОДКЛЮЧЕНИЕ К СЕРВЕРУ АНАЛИЗА...";

        // 2. Перенаправление на твой реальный Стримлит-проект

        const REAL_APP_URL = "https://alacademyprjcts2-6ld6rn87kgzaxu8psfwesa.streamlit.app/"; 

        setTimeout(() => {
            window.location.href = REAL_APP_URL;
        }, 2000);
    }
</script>
